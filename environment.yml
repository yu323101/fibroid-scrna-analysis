name: singlecell
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R 版本
  - r-base=4.3.1
  
  # 系统依赖
  - curl
  - openssl
  - libxml2
  - libcurl
  - zlib
  
  # R 包（CRAN）
  - r-seurat=4.3.0
  - r-seuratobject=4.1.3
  - r-ggplot2=3.4.0
  - r-dplyr=1.1.0
  - r-tidyr=1.3.0
  - r-readr=2.1.0
  - r-stringr=1.5.0
  - r-pheatmap=1.0.12
  - r-patchwork=1.1.0
  - r-ggvenndiagram=1.2.0
  - r-upsetr=1.4.0
  - r-matrix=1.6.0
  - r-rcpp=1.0.10
  - r-rcppeigen=0.3.3.9.3
  - r-igraph=1.4.0
  
  # Bioconductor 包
  - bioconductor-geoquery=2.66.0
  - bioconductor-deseq2=1.38.0
  - bioconductor-biomart=2.54.0
  - bioconductor-complexheatmap=2.14.0
  - bioconductor-summarizedexperiment=1.28.0
  - bioconductor-s4vectors=0.36.0
  - bioconductor-iranges=2.32.0
  - bioconductor-genomicranges=1.50.0
  - bioconductor-biocgenerics=0.44.0
  - bioconductor-biobase=2.58.0
  
  # Quarto
  - quarto=1.3.450
  
  # Python（Quarto 需要）
  - python=3.11
  - jupyter
  - nbformat

# 安装后脚本（可选）
# post-install script to verify installation
# 可以通过 R 脚本安装额外的包
