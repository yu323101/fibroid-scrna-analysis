name: singlecell
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R 版本
  - r-base=4.3
  
  # 系统依赖
  - curl
  - openssl
  - libxml2
  - libcurl
  - zlib
  
  # R 包（CRAN）- 移除版本号以解决依赖冲突
  - r-seurat
  - r-seuratobject
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-stringr
  - r-pheatmap
  - r-patchwork
  - r-matrix
  - r-rcpp
  - r-rcppeigen
  
  # Bioconductor 包 - 移除版本号
  - bioconductor-geoquery
  - bioconductor-deseq2
  - bioconductor-biomart
  - bioconductor-complexheatmap
  - bioconductor-summarizedexperiment
  - bioconductor-s4vectors
  - bioconductor-iranges
  - bioconductor-genomicranges
  - bioconductor-biocgenerics
  - bioconductor-biobase
  
  # Quarto
  - quarto
  
  # Python（Quarto 需要）
  - python=3.11
  - jupyter
  - nbformat

# 注意：ggVennDiagram 和 UpSetR 需要通过 R 安装
# R -e "install.packages(c('ggVennDiagram', 'UpSetR'))"
